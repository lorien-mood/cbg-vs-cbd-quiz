<html lang="en">
<head>

  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=Playfair+Display:wght@700&display=swap" rel="stylesheet">

    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: 'DM Sans', sans-serif;
      background: transparent;
      display: flex;
      justify-content: center;
      padding: 12px;
      -webkit-font-smoothing: antialiased;
    }

    .widget-wrapper {
      width: 100%;
      max-width: 580px;
    }

    .widget-card {
      background: #ffffff;
      border-radius: 20px;
      border: 1px solid rgba(27, 58, 47, 0.08);
      box-shadow: 0 4px 24px rgba(27, 58, 47, 0.06);
      overflow: hidden;
    }

    .widget-header {
      text-align: center;
      padding: 28px 24px 8px;
    }

    .widget-header h2 {
      font-family: 'Playfair Display', serif;
      font-weight: 700;
      font-size: 22px;
      color: #1B3A2F;
      line-height: 1.3;
      margin-bottom: 6px;
    }

    .widget-header p {
      font-size: 13px;
      color: #7A8B82;
      font-weight: 500;
      line-height: 1.5;
    }

    /* Progress bar */
    .progress-bar-track {
      height: 4px;
      background: rgba(27, 58, 47, 0.06);
      margin: 16px 24px 0;
      border-radius: 2px;
      overflow: hidden;
    }

    .progress-bar-fill {
      height: 100%;
      background: #1B3A2F;
      border-radius: 2px;
      transition: width 0.5s cubic-bezier(0.4, 0, 0.2, 1);
      width: 0%;

    /* Question area */
    .question-area {
      padding: 24px 24px 28px;
      min-height: 320px;
      display: flex;
      flex-direction: column;
    }

    .step-label {
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: #A0ADA6;
      margin-bottom: 10px;
    }

    .question-text {
      font-size: 17px;
      font-weight: 600;
      color: #1B3A2F;
      line-height: 1.45;
      margin-bottom: 20px;
    }

    .options {
      display: flex;
      flex-direction: column;
      gap: 10px;
      flex: 1;
    }

    .option-btn {
      display: flex;
      align-items: center;
      gap: 12px;
      width: 100%;
      padding: 14px 16px;
      background: #F8F6F2;
      border: 2px solid transparent;
      border-radius: 12px;
      cursor: pointer;
      transition: all 0.3s ease;
      text-align: left;
      font-family: 'DM Sans', sans-serif;
    }

    .option-btn:hover {
      border-color: rgba(27, 58, 47, 0.15);
      background: #f3f0ea;
    }

    .option-btn.selected {
      border-color: #1B3A2F;
      background: rgba(27, 58, 47, 0.05);
    }

    .option-icon {
      width: 36px;
      height: 36px;
      border-radius: 10px;
      background: rgba(27, 58, 47, 0.08);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 16px;
      flex-shrink: 0;
      transition: background 0.3s ease;
    }

    .option-btn.selected .option-icon {
      background: #1B3A2F;
    }

    .option-btn.selected .option-icon svg {
      stroke: #ffffff;
    }

    .option-label {
      font-size: 15px;
      font-weight: 500;
      color: #1B3A2F;
      line-height: 1.35;
    }

    .option-sublabel {
      font-size: 12px;
      color: #7A8B82;
      font-weight: 400;
      margin-top: 2px;
    }

    /* Navigation */
    .nav-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 0 24px 24px;
    }

    .back-btn {
      font-family: 'DM Sans', sans-serif;
      font-size: 14px;
      font-weight: 600;
      color: #7A8B82;
      background: none;
      border: none;
      cursor: pointer;
      padding: 8px 0;
      transition: color 0.3s ease;
    }

    .back-btn:hover {
      color: #1B3A2F;
    }

    .back-btn.hidden {
      visibility: hidden;
    }

    .next-btn {

      font-size: 14px;
      font-weight: 700;
      color: #ffffff;
      background: #1B3A2F;
      border: none;
      border-radius: 20px;
      padding: 10px 28px;
      cursor: pointer;
      transition: all 0.3s ease;
      opacity: 0.35;
      pointer-events: none;

    .next-btn.active {
      opacity: 1;
      pointer-events: auto;
    }

    .next-btn.active:hover {
      background: #2A5C47;
    }

    /* Results */
    .result-area {
      padding: 24px;
      display: none;
      animation: fadeUp 0.5s ease forwards;
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(12px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .result-badge {
      display: inline-block;
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: #ffffff;
      background: #1B3A2F;
      padding: 5px 14px;
      border-radius: 20px;
      margin-bottom: 16px;
    }

    .result-title {
      font-family: 'Playfair Display', serif;
      font-weight: 700;
      font-size: 20px;
      color: #1B3A2F;
      line-height: 1.3;
      margin-bottom: 10px;
    }

    .result-description {
      font-size: 14px;
      color: #4A5D53;
      line-height: 1.6;
      margin-bottom: 20px;
    }

    .product-card {
      background: #F8F6F2;
      border-radius: 12px;
      padding: 16px;
      margin-bottom: 12px;
    }

    .product-card-label {
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      color: #7A8B82;
      margin-bottom: 8px;
    }

    .product-card-name {
      font-size: 16px;
      font-weight: 700;
      color: #1B3A2F;
      margin-bottom: 4px;
    }

    .product-card-detail {
      font-size: 13px;
      color: #4A5D53;
      line-height: 1.5;
    }

    .product-card-link {
      display: inline-block;
      margin-top: 10px;
      font-size: 13px;
      font-weight: 700;
      color: #1B3A2F;
      text-decoration: none;
      border-bottom: 2px solid #1B3A2F;
      padding-bottom: 1px;
      transition: color 0.3s ease, border-color 0.3s ease;
    }

    .product-card-link:hover {
      color: #2A5C47;

    }

    .why-section {
      margin-top: 20px;
      padding-top: 16px;
      border-top: 1px solid rgba(27, 58, 47, 0.08);
    }

    .why-title {
      font-size: 13px;
      font-weight: 700;
      color: #1B3A2F;
      margin-bottom: 8px;
    }

    .why-list {
      list-style: none;

    }

    .why-list li {
      font-size: 13px;
      color: #4A5D53;
      line-height: 1.5;

      content: '';

      height: 8px;

    .restart-btn {

      margin-top: 20px;

    /* Responsive */

      .option-btn { padding: 12px 14px; }
      .option-icon { width: 32px; height: 32px; }
      .result-title { font-size: 18px; }
      .question-area { min-height: 290px; padding: 20px 20px 24px; }
      .nav-row { padding: 0 20px 20px; }
      .result-area { padding: 20px; }
    }
  </style>
</head>

          { label: 'Calm and settled', sub: 'A gentle sense of ease and relaxation', icon: 'wave', value: 'calm' },

    var answers = [];
    var currentStep = 0;
    var selectedOption = null;

    var iconSVGs = {

      clock: '<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#1B3A2F" stroke-width="2" stroke-linecap="round"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>',
      wave: '<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#1B3A2F" stroke-width="2" stroke-linecap="round"><path d="M2 12c2-3 4-3 6 0s4 3 6 0 4-3 6 0"/><path d="M2 17c2-3 4-3 6 0s4 3 6 0 4-3 6 0"/></svg>',

    function renderQuestion() {
      var q = questions[currentStep];
      var html = '<div class="step-label">' + q.step + '</div>';
      html += '<div class="question-text">' + q.text + '</div>';
      html += '<div class="options">';
      q.options.forEach(function(opt, i) {
        html += '<button class="option-btn" onclick="selectOption(' + i + ', \'' + opt.value + '\')" data-index="' + i + '">';
        html += '<div class="option-icon">' + iconSVGs[opt.icon] + '</div>';
        html += '<div><div class="option-label">' + opt.label + '</div>';
        html += '<div class="option-sublabel">' + opt.sub + '</div></div>';
        html += '</button>';
      });
      html += '</div>';

      document.getElementById('questionArea').innerHTML = html;
      document.getElementById('questionArea').style.display = 'flex';
      document.getElementById('navRow').style.display = 'flex';
      document.getElementById('resultArea').style.display = 'none';

      selectedOption = null;
      document.getElementById('nextBtn').className = 'next-btn';
      document.getElementById('nextBtn').textContent = currentStep === 3 ? 'See Results' : 'Next';
      document.getElementById('backBtn').className = currentStep === 0 ? 'back-btn hidden' : 'back-btn';
      document.getElementById('progressFill').style.width = ((currentStep) / 4 * 100) + '%';

      // Restore selection if going back
      if (answers[currentStep] !== undefined) {
        var btns = document.querySelectorAll('.option-btn');
        btns.forEach(function(btn) {
          var idx = parseInt(btn.getAttribute('data-index'));
          if (questions[currentStep].options[idx].value === answers[currentStep]) {
            btn.classList.add('selected');
            selectedOption = answers[currentStep];
            document.getElementById('nextBtn').className = 'next-btn active';
          }
        });
      }
    }

    function selectOption(index, value) {
      selectedOption = value;
      var btns = document.querySelectorAll('.option-btn');
      btns.forEach(function(b) { b.classList.remove('selected'); });
      btns[index].classList.add('selected');
      document.getElementById('nextBtn').className = 'next-btn active';
    }

    function goNext() {
      if (!selectedOption) return;
      answers[currentStep] = selectedOption;
      if (currentStep < 3) {
        currentStep++;
        renderQuestion();
      } else {
        showResult();
      }
    }

    function goBack() {
      if (currentStep > 0) {
        currentStep--;
        renderQuestion();
      }
    }

    function getResult() {
      var time = answers[0];
      var experience = answers[1];
      var cbdHistory = answers[2];
      var format = answers[3];

      // Scoring: CBG points, CBD points, combo points
      var cbg = 0, cbd = 0, combo = 0;

      // Time of day
      if (time === 'daytime') { cbg += 2; }
      else if (time === 'evening') { cbd += 2; }
      else { combo += 2; }

      // Experience
      if (experience === 'focus') { cbg += 2; }
      else if (experience === 'calm') { cbd += 2; }
      else { combo += 2; }

      // CBD history
      if (cbdHistory === 'experienced') { combo += 1; cbd += 1; }
      else if (cbdHistory === 'underwhelmed') { cbg += 2; combo += 1; }
      else { cbd += 1; }

      // Format influences product recommendation, not cannabinoid choice

      var winner;
      if (combo >= cbg && combo >= cbd) winner = 'combo';
      else if (cbg > cbd) winner = 'cbg';
      else winner = 'cbd';

      var products = {

          candy: { name: 'THC + CBD Dessert Taffy', url: 'https://mood.com/product/delta-9-thc-cbd-dessert-taffy', detail: 'Chewy taffy with balanced THC and CBD in every piece' },
          any: { name: 'Pure Relief CBD Gummies', url: 'https://mood.com/product/pure-relief-cbd-gummies', detail: 'The most popular starting point for CBD newcomers' }
        },
        cbg: {

          tincture: { name: '1:1 THC & CBD Tincture', url: 'https://mood.com/product/11-thc-cbd-tincture-900mg', detail: '900mg balanced tincture with the full spectrum of minor cannabinoids including CBG' },
          candy: { name: 'THC + CBD Fruity Taffy', url: 'https://mood.com/product/delta-9-thc-cbd-fruity-taffy', detail: 'Full-spectrum taffy combining THC, CBD, and trace cannabinoids like CBG' },
          any: { name: 'Mind Magic THC Gummies', url: 'https://mood.com/product/mind-magic-thc-gummies', detail: 'A focus-oriented gummy with a full cannabinoid profile' }
        },
        combo: {
          gummies: { name: 'Epic Euphoria THC Gummies', url: 'https://mood.com/product/epic-euphoria-thc-gummies', detail: 'A multi-cannabinoid blend for a balanced, well-rounded experience' },
          tincture: { name: '1:1 THC & CBD Tincture', url: 'https://mood.com/product/11-thc-cbd-tincture-900mg', detail: 'Equal parts THC and CBD with the full spectrum of minor cannabinoids' },

          any: { name: 'Epic Euphoria THC Gummies', url: 'https://mood.com/product/epic-euphoria-thc-gummies', detail: 'A versatile gummy with multiple cannabinoids working together' }
        }
      };

      var resultData = {
        cbd: {
          badge: 'Your match: CBD',
          title: 'CBD Is Your Starting Point',
          description: 'Based on your preferences, a CBD-forward product is the best fit. CBD is known for promoting a calm, settled experience that builds over time with consistent use. As a full-spectrum product, it naturally includes trace amounts of CBG and other cannabinoids that complement the CBD through the entourage effect.',
          reasons: [
            'You gravitate toward calm and relaxation',
            'CBD is the most widely available and affordable cannabinoid',
            'Full-spectrum CBD products naturally include CBG'
          ]
        },
        cbg: {
          badge: 'Your match: CBG-forward',
          title: 'You Want What CBG Brings to the Table',
          description: 'Your answers point toward CBG\'s signature profile: clarity, focus, and a noticeable but non-psychoactive shift. Since standalone CBG products are still rare and expensive, the best way to get a CBG-forward experience is through a full-spectrum product that preserves the plant\'s natural CBG content alongside other cannabinoids.',
          reasons: [
            'You prefer daytime clarity and focus',
            'Full-spectrum products deliver CBG alongside other cannabinoids',
            'CBG works best when combined with CBD through the entourage effect'
          ]
        },
        combo: {
          badge: 'Your match: CBG + CBD',
          title: 'A Full-Spectrum Combination Fits Best',
          description: 'Your preferences point to the sweet spot where CBG and CBD overlap. A full-spectrum product that preserves both cannabinoids (plus terpenes and other hemp compounds) delivers the entourage effect, where all the plant\'s natural components work together for a balanced, well-rounded experience.',
          reasons: [

        }
      };

      var product = products[winner][format] || products[winner]['any'];
      var result = resultData[winner];
      result.product = product;
      return result;
    }

    function showResult() {
      document.getElementById('progressFill').style.width = '100%';
      document.getElementById('questionArea').style.display = 'none';
      document.getElementById('navRow').style.display = 'none';

      var r = getResult();

      var html = '<div class="result-badge">' + r.badge + '</div>';
      html += '<div class="result-title">' + r.title + '</div>';
      html += '<div class="result-description">' + r.description + '</div>';

      html += '<div class="product-card">';
      html += '<div class="product-card-label">Recommended product</div>';
      html += '<div class="product-card-name">' + r.product.name + '</div>';
      html += '<div class="product-card-detail">' + r.product.detail + '</div>';
      html += '<a class="product-card-link" href="' + r.product.url + '" target="_blank" rel="noopener">View at mood.com &rarr;</a>';
      html += '</div>';

      html += '<div class="why-section">';
      html += '<div class="why-title">Why this recommendation</div>';
      html += '<ul class="why-list">';
      r.reasons.forEach(function(reason) {
        html += '<li>' + reason + '</li>';
      });
      html += '</ul></div>';

      html += '<button class="restart-btn" onclick="restart()">Retake Quiz</button>';

      document.getElementById('resultArea').innerHTML = html;
      document.getElementById('resultArea').style.display = 'block';

      // Communicate height to parent iframe
      if (window.parent !== window) {
        try {
          var height = document.querySelector('.widget-wrapper').offsetHeight + 24;
          window.parent.postMessage({ type: 'resize', height: height }, '*');
        } catch(e) {}
      }
    }

    function restart() {
      answers = [];
      currentStep = 0;
      selectedOption = null;
      renderQuestion();
    }

    // Init
    renderQuestion();
  </script>
</body>
</html>
